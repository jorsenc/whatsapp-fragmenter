<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workspace Explorer</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <header>
        <h1>Workspace Explorer</h1>

        <div class="header-columns">
            <div class="header-left">
                <input type="text" id="searchInput" class="search-bar" placeholder="Buscar por nombre, tecnologia, tipo...">
                <select id="typeFilter">
                    <option value="">Todos los tipos</option>
                    <option value="Web App">Web App</option>
                    <option value="Astro Site">Astro Site</option>
                    <option value="Node.js Project">Node.js Project</option>
                    <option value="MCP Server">MCP Server</option>
                    <option value="Documentation">Documentation</option>
                    <option value="Mixed Project">Mixed Project</option>
                </select>
            </div>

            <div class="header-right">
                <div class="header-info">
                    <div class="stat">
                        <span>Proyectos:</span>
                        <span class="stat-value" id="stat-projects">0</span>
                    </div>
                    <div class="stat">
                        <span>Actualización:</span>
                        <span class="stat-value" id="stat-time">Cargando...</span>
                    </div>
                    <div class="stat">
                        <span>Tamaño total:</span>
                        <span class="stat-value" id="stat-size">Calculando...</span>
                    </div>
                </div>

                <div class="header-buttons">
                    <button class="btn-secondary" onclick="rescanWorkspace()">Rescanear</button>
                    <button class="btn-primary" onclick="exportJSON()">Exportar JSON</button>
                    <button class="btn-secondary" onclick="exportCSV()">Exportar CSV</button>
                </div>
            </div>
        </div>
    </header>

    <button class="sidebar-toggle" id="sidebarToggle" title="Abrir detalles">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 5V19M5 12H19" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
    </button>

    <div class="container">
        <div class="panel projects-panel">
            <h2>Proyectos</h2>
            <div class="projects-list" id="projectsList">
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Cargando proyectos...</p>
                </div>
            </div>
        </div>

        <div class="panel sidebar" id="detailsSidebar">
            <div class="sidebar-resize-handle" id="sidebarResizeHandle"></div>
            <button class="sidebar-close" onclick="closeSidebar()" title="Cerrar">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M18 6L6 18M6 6L18 18" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
            <h2>Detalles</h2>
            <div class="details" id="detailsPanel">
                <div class="no-project">
                    Selecciona un proyecto para ver detalles
                </div>
            </div>
        </div>
    </div>

    <div id="fileModal" class="modal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal()">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M18 6L6 18M6 6L18 18" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
            <div class="modal-header" id="modalTitle"></div>
            <div class="file-content" id="modalContent"></div>
            <div class="export-info">
                Usa Ctrl+A para seleccionar todo y copiar
            </div>
        </div>
    </div>

    <footer class="footer">
        <p>Workspace Explorer v1.0 | Explora la estructura de tus proyectos</p>
    </footer>

    <script>
        let allProjects = [];

        async function loadWorkspaceData() {
            try {
                const response = await fetch('workspace-data.json');
                const data = await response.json();
                allProjects = data.projects;

                document.getElementById('stat-projects').textContent = data.projectCount;
                document.getElementById('stat-time').textContent = new Date(data.scannedAt).toLocaleDateString('es-ES');

                const totalSize = calculateTotalSize(allProjects);
                document.getElementById('stat-size').textContent = totalSize;

                renderProjects(allProjects);
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('projectsList').innerHTML =
                    '<div class="no-results">Error al cargar workspace-data.json</div>';
            }
        }

        function calculateTotalSize(projects) {
            const sizeMap = {
                'B': 1,
                'KB': 1024,
                'MB': 1024 * 1024
            };

            let totalBytes = 0;
            for (const project of projects) {
                const match = project.size.match(/(\d+(?:\.\d+)?)\s*([A-Z]+)/);
                if (match) {
                    const value = parseFloat(match[1]);
                    const unit = match[2];
                    totalBytes += value * (sizeMap[unit] || 1);
                }
            }

            if (totalBytes < 1024) return `${totalBytes.toFixed(0)} B`;
            if (totalBytes < 1024 * 1024) return `${(totalBytes / 1024).toFixed(1)} MB`;
            return `${(totalBytes / (1024 * 1024)).toFixed(1)} GB`;
        }

        let filteredProjects = [];

        function renderProjects(projects) {
            const list = document.getElementById('projectsList');
            filteredProjects = projects;

            if (projects.length === 0) {
                list.innerHTML = '<div class="no-results">No se encontraron proyectos</div>';
                return;
            }

            list.innerHTML = projects.map((project, index) => `
                <div class="project-item" onclick="selectProject(${index})">
                    <div class="project-name">${project.name}</div>
                    <div class="project-type">${project.type}</div>
                    ${project.intelligentType && project.intelligentType.length > 0 ? `<div class="project-intelligent">${project.intelligentType.slice(0, 2).join(' | ')}</div>` : ''}
                    <div class="project-desc">${project.description.substring(0, 100)}...</div>
                </div>
            `).join('');
        }

        function selectProject(index) {
            const project = filteredProjects[index];
            const items = document.querySelectorAll('.project-item');
            items.forEach(item => item.classList.remove('active'));
            items[index].classList.add('active');

            showProjectDetails(project);
            openSidebar();
        }

        function openSidebar() {
            const sidebar = document.getElementById('detailsSidebar');
            sidebar.classList.add('open');
            sidebar.classList.remove('hidden');
            updateToggleIcon(true);
        }

        function closeSidebar() {
            const sidebar = document.getElementById('detailsSidebar');
            sidebar.classList.remove('open');
            updateToggleIcon(false);
        }

        function updateToggleIcon(isOpen) {
            const toggle = document.getElementById('sidebarToggle');
            const svg = toggle.querySelector('svg');
            if (isOpen) {
                svg.innerHTML = '<path d="M5 12H19" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>';
            } else {
                svg.innerHTML = '<path d="M12 5V19M5 12H19" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>';
            }
        }

        function showProjectDetails(project) {
            const panel = document.getElementById('detailsPanel');

            let techHTML = '';
            if (project.techStack && project.techStack.length > 0) {
                techHTML = project.techStack.map(tech => `<span class="tag">${tech}</span>`).join('');
            }

            let statsHTML = `
                <div class="detail-row">
                    <div class="detail-label">Estadisticas</div>
                    <div class="detail-value">
                        <p>Git: ${project.stats.hasGit ? 'SI' : 'NO'}</p>
                        <p>Tests: ${project.stats.hasTests ? 'SI (' + project.stats.testFiles.join(', ') + ')' : 'NO'}</p>
                        <p>Variables: ${project.stats.hasEnv ? 'SI' : 'NO'}</p>
                        <p>README: ${project.stats.hasReadme ? 'PRESENTE' : 'FALTA'}</p>
                        <p>CLAUDE.md: ${project.stats.hasClaude ? 'PRESENTE' : 'FALTA'}</p>
                    </div>
                </div>
            `;

            let filesHTML = '';
            if (project.files.readme || project.files.claude || project.files.packageJson) {
                filesHTML = `
                    <div class="detail-row">
                        <div class="detail-label">Archivos</div>
                        <div class="file-actions">
                            ${project.files.readme ? `<button class="file-btn available" onclick="loadFileContent('${project.name}', 'README.md')">README.md</button>` : ''}
                            ${project.files.claude ? `<button class="file-btn available" onclick="loadFileContent('${project.name}', 'CLAUDE.md')">CLAUDE.md</button>` : ''}
                            ${project.files.packageJson ? `<button class="file-btn available" onclick="loadFileContent('${project.name}', 'package.json')">package.json</button>` : ''}
                            ${project.files.setup ? `<button class="file-btn available" onclick="loadFileContent('${project.name}', 'SETUP.md')">SETUP.md</button>` : ''}
                        </div>
                    </div>
                `;
            }

            let treeHTML = '';
            if (project.fileTree && project.fileTree.length > 0) {
                treeHTML = `
                    <div class="detail-row">
                        <div class="detail-label">Estructura</div>
                        <div class="file-tree">
                            ${renderFileTree(project.fileTree, 0, project.name)}
                        </div>
                    </div>
                `;
            }

            panel.innerHTML = `
                <div class="detail-row">
                    <div class="detail-label">Ruta</div>
                    <div class="detail-value">${project.path}</div>
                </div>

                <div class="detail-row">
                    <div class="detail-label">Tipo Original</div>
                    <div class="detail-value">${project.type}</div>
                </div>

                ${project.intelligentType && project.intelligentType.length > 0 ? `
                <div class="detail-row">
                    <div class="detail-label">Clasificacion Inteligente</div>
                    <div class="detail-value">
                        ${project.intelligentType.map(t => `<span class="tag">${t}</span>`).join('')}
                    </div>
                </div>
                ` : ''}

                <div class="detail-row">
                    <div class="detail-label">Descripcion</div>
                    <div class="detail-value">${project.description}</div>
                </div>

                <div class="detail-row">
                    <div class="detail-label">Tecnologia</div>
                    <div class="detail-value">${techHTML || '<em>No determinado</em>'}</div>
                </div>

                <div class="detail-row">
                    <div class="detail-label">Tamaño</div>
                    <div class="detail-value">${project.size}</div>
                </div>

                <div class="detail-row">
                    <div class="detail-label">Ultima modificacion</div>
                    <div class="detail-value">${project.lastModified}</div>
                </div>

                ${statsHTML}
                ${filesHTML}
                ${treeHTML}
            `;
        }

        function renderFileTree(tree, depth = 0, projectName = '', path = '') {
            if (!tree || tree.length === 0) return '';

            return tree.map(item => {
                const itemPath = path ? path + '/' + item.name : item.name;
                const isFile = item.type === 'file';
                // Archivos previewables: extensiones comunes + configuración + imágenes
                const isPreviewable = isFile && (
                    /\.(md|json|txt|js|ts|html|css|py|java|cpp|c|go|rb|php|sh|yml|yaml|xml|csv|log|env|editorconfig|npmrc|gitattributes|example|png|jpg|jpeg|gif|svg|webp|ico|bmp)$/i.test(item.name) ||
                    /^\.(gitignore|env|editorconfig|npmrc|gitattributes)/.test(item.name)
                );

                const hasChildren = item.children && item.children.length > 0;
                let treeNameHtml = '';

                if (isPreviewable) {
                    treeNameHtml = `<span class="tree-name" onclick="previewTreeFile('${projectName}', '${itemPath}')">${item.name}</span>`;
                } else if (!isFile && hasChildren) {
                    treeNameHtml = `<span class="tree-name" onclick="handleTreeClick(event)">${item.name}</span>`;
                } else {
                    treeNameHtml = `<span class="tree-name">${item.name}</span>`;
                }

                return `
                    <div class="tree-item ${item.type}">
                        ${hasChildren ? `<span class="tree-toggle" onclick="handleTreeClick(event)">&gt;</span>` : '<span class="tree-toggle"></span>'}
                        ${treeNameHtml}
                        ${item.size ? ` <span class="tree-size">(${formatBytes(item.size)})</span>` : ''}
                        ${hasChildren ? `
                            <div class="tree-children">
                                ${renderFileTree(item.children, depth + 1, projectName, itemPath)}
                            </div>
                        ` : ''}
                    </div>
                `;
            }).join('');
        }

        function handleTreeClick(event) {
            event.stopPropagation();

            const treeItem = event.target.closest('.tree-item');
            const toggle = treeItem.querySelector('.tree-toggle');
            const children = treeItem.querySelector('.tree-children');

            if (children && toggle) {
                children.classList.toggle('open');
                toggle.textContent = children.classList.contains('open') ? 'V' : '>';
            }
        }

        function previewTreeFile(projectName, filePath) {
            const fullPath = `/workspace-files/${projectName}/${filePath}`;
            const fileName = filePath.toLowerCase();
            const modalContent = document.getElementById('modalContent');

            // Detectar si es una imagen
            const isImage = /\.(png|jpg|jpeg|gif|svg|webp|ico|bmp)$/i.test(fileName);

            document.getElementById('modalTitle').textContent = `${projectName} / ${filePath}`;

            if (isImage) {
                // Para imágenes desde workspace, solicitar copia a public
                fetch(`/copy-to-public/${projectName}/${filePath}`)
                    .then(r => r.json())
                    .then(data => {
                        if (data.publicPath) {
                            modalContent.innerHTML = `<img src="${data.publicPath}" class="image-preview" alt="${filePath}">`;
                        } else {
                            modalContent.innerHTML = `<p>No se pudo cargar la imagen</p>`;
                        }
                    })
                    .catch(e => modalContent.innerHTML = `<p>Error: ${e.message}</p>`)
                    .finally(() => document.getElementById('fileModal').classList.add('active'));
            } else {
                // Para archivos de texto
                fetch(fullPath)
                    .then(res => {
                        if (!res.ok) throw new Error('No encontrado');
                        return res.text();
                    })
                    .then(content => {
                        if (content.length > 100000) {
                            content = content.substring(0, 100000) + '\n\n... (archivo muy grande, contenido truncado)';
                        }

                        // Detectar si es un archivo de chat de WhatsApp
                        const isChatFile = fileName.includes('chat_');
                        const hasWhatsAppPatterns = content.match(/\[\d{1,2}\/\d{1,2}\/\d{2,4},\s*\d{1,2}:\d{2}/) ||
                                                   content.match(/imagen omitida|Video omitido|Audio omitido/i);

                        // Si es un chat, SIEMPRE mostrar como preformateado
                        if (isChatFile || hasWhatsAppPatterns) {
                            modalContent.innerHTML = `<pre>${escapeHtml(content)}</pre>`;
                        } else if (fileName.endsWith('.md')) {
                            // Para markdown regular, usar marked si está disponible
                            if (typeof marked !== 'undefined') {
                                modalContent.innerHTML = marked.parse(content);
                            } else {
                                modalContent.innerHTML = `<pre>${escapeHtml(content)}</pre>`;
                            }
                        } else if (fileName.endsWith('.json')) {
                            // Para JSON, formatear con indentación
                            try {
                                const jsonObj = JSON.parse(content);
                                const formatted = JSON.stringify(jsonObj, null, 2);
                                modalContent.innerHTML = `<pre class="json-content">${escapeHtml(formatted)}</pre>`;
                            } catch (e) {
                                modalContent.innerHTML = `<pre>${escapeHtml(content)}</pre>`;
                            }
                        } else if (fileName.endsWith('.csv')) {
                            // Para CSV, convertir a tabla
                            const lines = content.split('\n').filter(line => line.trim());
                            const rows = lines.map(line =>
                                line.split(',').map(cell => cell.trim().replace(/^"|"$/g, ''))
                            );
                            let html = '<table class="csv-table"><tbody>';
                            rows.forEach((row, i) => {
                                html += `<tr>${row.map((cell, j) =>
                                    `<td>${escapeHtml(cell)}</td>`
                                ).join('')}</tr>`;
                            });
                            html += '</tbody></table>';
                            modalContent.innerHTML = html;
                        } else if (fileName.match(/\.(gitignore|env|editorconfig|npmrc|gitattributes)$/)) {
                            // Para archivos de configuración, destacar comentarios
                            const lines = content.split('\n');
                            const formatted = lines.map(line => {
                                if (line.trim().startsWith('#')) {
                                    return `<span class="config-comment">${escapeHtml(line)}</span>`;
                                }
                                return escapeHtml(line);
                            }).join('\n');
                            modalContent.innerHTML = `<pre class="config-content">${formatted}</pre>`;
                        } else if (fileName.match(/\.(xml|yml|yaml)$/)) {
                            // Para XML/YAML, mostrar preformateado con indentación
                            modalContent.innerHTML = `<pre class="code-content">${escapeHtml(content)}</pre>`;
                        } else if (fileName.match(/\.(js|ts|tsx|jsx|py|java|cpp|c|go|rb|php|sh|bash|html|css)$/)) {
                            // Para código, mostrar con highlight si es posible
                            modalContent.innerHTML = `<pre class="code-content"><code>${escapeHtml(content)}</code></pre>`;
                        } else {
                            // Para otros archivos, mostrar como preformateado
                            modalContent.innerHTML = `<pre>${escapeHtml(content)}</pre>`;
                        }

                        document.getElementById('fileModal').classList.add('active');
                    })
                    .catch(err => {
                        alert('No se pudo cargar: ' + filePath + '\n\n' + err.message);
                    });
            }
        }

        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        function formatBytes(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
        }

        function filterProjects() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const typeFilter = document.getElementById('typeFilter').value;

            const filtered = allProjects.filter(project => {
                const matchesSearch = !search ||
                    project.name.toLowerCase().includes(search) ||
                    project.description.toLowerCase().includes(search) ||
                    project.techStack.some(t => t.toLowerCase().includes(search)) ||
                    project.type.toLowerCase().includes(search);

                const matchesType = !typeFilter || project.type === typeFilter;

                return matchesSearch && matchesType;
            });

            renderProjects(filtered);
        }

        async function loadFileContent(projectName, fileName) {
            const fileUrl = `/workspace-files/${projectName}/${fileName}`;
            const isImage = /\.(png|jpg|jpeg|gif|svg|webp|ico|bmp)$/i.test(fileName.toLowerCase());

            document.getElementById('modalTitle').textContent = `${projectName} / ${fileName}`;
            const modalContent = document.getElementById('modalContent');

            try {
                if (isImage) {
                    // Para imágenes desde workspace, solicitar copia a public
                    fetch(`/copy-to-public/${projectName}/${fileName}`)
                        .then(r => r.json())
                        .then(data => {
                            if (data.publicPath) {
                                modalContent.innerHTML = `<img src="${data.publicPath}" class="image-preview" alt="${fileName}">`;
                            } else {
                                modalContent.innerHTML = `<p>Error: No se pudo cargar la imagen</p>`;
                            }
                        })
                        .catch(e => modalContent.innerHTML = `<p>Error: ${e.message}</p>`);
                } else {
                    // Para archivos de texto
                    const response = await fetch(fileUrl);
                    if (!response.ok) throw new Error('No encontrado');
                    let content = await response.text();

                    if (content.length > 50000) {
                        content = content.substring(0, 50000) + '\n\n... (contenido truncado, archivo muy grande)';
                    }

                    // Detectar si es un archivo de chat de WhatsApp
                    const isChatFile = fileName.toLowerCase().includes('chat_');
                    const hasWhatsAppPatterns = content.match(/\[\d{1,2}\/\d{1,2}\/\d{2,4},\s*\d{1,2}:\d{2}/) ||
                                               content.match(/imagen omitida|Video omitido|Audio omitido/i);

                    // Si es un chat, SIEMPRE mostrar como preformateado
                    if (isChatFile || hasWhatsAppPatterns) {
                        modalContent.innerHTML = `<pre>${escapeHtml(content)}</pre>`;
                    } else if (fileName.toLowerCase().endsWith('.md')) {
                        // Para markdown regular, usar marked si está disponible
                        if (typeof marked !== 'undefined') {
                            modalContent.innerHTML = marked.parse(content);
                        } else {
                            modalContent.innerHTML = `<pre>${escapeHtml(content)}</pre>`;
                        }
                    } else {
                        // Para otros archivos, mostrar como preformateado
                        modalContent.innerHTML = `<pre>${escapeHtml(content)}</pre>`;
                    }
                }

                document.getElementById('fileModal').classList.add('active');
            } catch (error) {
                alert('No se pudo cargar ' + fileName + ': ' + error.message);
            }
        }

        function closeModal() {
            document.getElementById('fileModal').classList.remove('active');
        }

        function exportJSON() {
            const data = {
                exportedAt: new Date().toISOString(),
                projectCount: allProjects.length,
                projects: allProjects
            };

            const json = JSON.stringify(data, null, 2);
            downloadFile(json, 'workspace-export.json', 'application/json');
        }

        function exportCSV() {
            const headers = ['Proyecto', 'Tipo', 'Ruta', 'Tamaño', 'Tech Stack', 'Ultima Mod', 'Git', 'Tests', 'Env', 'README'];
            const rows = allProjects.map(p => [
                p.name,
                p.type,
                p.path,
                p.size,
                p.techStack.join('; '),
                p.lastModified,
                p.stats.hasGit ? 'Si' : 'No',
                p.stats.hasTests ? 'Si' : 'No',
                p.stats.hasEnv ? 'Si' : 'No',
                p.stats.hasReadme ? 'Si' : 'No'
            ]);

            let csv = headers.map(h => `"${h}"`).join(',') + '\n';
            csv += rows.map(row => row.map(cell => `"${cell}"`).join(',')).join('\n');

            downloadFile(csv, 'workspace-export.csv', 'text/csv');
        }

        function downloadFile(content, fileName, mimeType) {
            const blob = new Blob([content], { type: mimeType });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = fileName;
            document.body.appendChild(a);
            a.click();
            window.URL.revokeObjectURL(url);
            document.body.removeChild(a);
        }

        document.getElementById('searchInput').addEventListener('input', filterProjects);
        document.getElementById('typeFilter').addEventListener('change', filterProjects);
        document.addEventListener('click', (e) => {
            if (e.target.id === 'fileModal') closeModal();
        });

        document.getElementById('sidebarToggle').addEventListener('click', () => {
            const sidebar = document.getElementById('detailsSidebar');
            if (sidebar.classList.contains('open')) {
                closeSidebar();
            } else {
                openSidebar();
            }
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeSidebar();
            }
        });

        async function rescanWorkspace() {
            const originalText = document.querySelector('.header-buttons button:first-child').textContent;
            const button = document.querySelector('.header-buttons button:first-child');

            button.textContent = 'Escaneando...';
            button.disabled = true;

            try {
                const response = await fetch('/rescan');
                const data = await response.json();

                allProjects = data.projects;
                document.getElementById('stat-projects').textContent = data.projectCount;
                document.getElementById('stat-time').textContent = new Date(data.scannedAt).toLocaleDateString('es-ES');

                const totalSize = calculateTotalSize(allProjects);
                document.getElementById('stat-size').textContent = totalSize;

                renderProjects(allProjects);
                closeSidebar();

                button.textContent = 'OK';
                setTimeout(() => {
                    button.textContent = originalText;
                    button.disabled = false;
                }, 2000);
            } catch (error) {
                console.error('Error rescaneando:', error);
                button.textContent = 'Error';
                setTimeout(() => {
                    button.textContent = originalText;
                    button.disabled = false;
                }, 2000);
            }
        }

        // Sidebar resizable functionality
        (function() {
            const sidebar = document.getElementById('detailsSidebar');
            const resizeHandle = document.getElementById('sidebarResizeHandle');
            let isResizing = false;
            let startX = 0;
            let startWidth = 0;

            if (!resizeHandle) return;

            resizeHandle.addEventListener('mousedown', (e) => {
                isResizing = true;
                startX = e.clientX;
                startWidth = sidebar.offsetWidth;
                resizeHandle.classList.add('dragging');
                document.body.style.userSelect = 'none';
                document.body.style.cursor = 'col-resize';
            });

            document.addEventListener('mousemove', (e) => {
                if (!isResizing) return;

                const diff = startX - e.clientX;
                const newWidth = startWidth + diff;
                const minWidth = 300;
                const maxWidth = Math.min(window.innerWidth * 0.8, 900);

                if (newWidth > minWidth && newWidth < maxWidth) {
                    sidebar.style.width = newWidth + 'px';
                }
            });

            document.addEventListener('mouseup', () => {
                if (isResizing) {
                    isResizing = false;
                    resizeHandle.classList.remove('dragging');
                    document.body.style.userSelect = '';
                    document.body.style.cursor = '';
                }
            });
        })();

        loadWorkspaceData();
    </script>
</body>
</html>
