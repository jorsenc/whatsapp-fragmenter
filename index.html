<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workspace Explorer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #ffffff;
            --accent: #e0e0e0;
            --accent2: #b0b0b0;
            --accent3: #a0a0a0;
            --bg: #0d0d0d;
            --bg-light: #1a1a1a;
            --text: #ffffff;
            --text-muted: #888888;
            --border: #2a2a2a;
            --success: #cccccc;
            --warning: #999999;
            --danger: #666666;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            font-size: 13px;
        }

        header {
            background: var(--bg-light);
            padding: 1rem 2rem;
            border-bottom: 2px solid var(--primary);
            position: sticky;
            top: 0;
            z-index: 30;
        }

        h1 {
            font-size: 1.6rem;
            margin-bottom: 0.8rem;
            color: var(--primary);
            width: 100%;
        }

        .header-columns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            align-items: start;
        }

        .header-left {
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
            align-items: center;
        }

        .header-right {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            align-items: flex-end;
        }

        .header-info {
            display: flex;
            gap: 1.5rem;
            font-size: 0.85rem;
            color: var(--text-muted);
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .header-buttons {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .stat {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .stat-value {
            color: var(--primary);
            font-weight: bold;
            font-size: 1rem;
        }

        .controls {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
            flex-wrap: wrap;
        }

        input[type="text"],
        select {
            padding: 0.6rem 0.8rem;
            border: 2px solid var(--border);
            background: var(--bg-light);
            color: var(--text);
            border-radius: 6px;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            min-width: 0;
        }

        input[type="text"]::placeholder {
            color: var(--text-muted);
        }

        select {
            cursor: pointer;
        }

        select option {
            background: var(--bg-light);
            color: var(--text);
            padding: 0.5rem;
        }

        select option:checked {
            background: var(--primary);
            color: var(--bg);
        }

        .search-bar {
            flex: 1;
            min-width: 200px;
        }

        #typeFilter {
            flex-shrink: 0;
        }

        input[type="text"]:focus,
        select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.05);
        }

        button {
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: bold;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-primary {
            background: var(--primary);
            color: var(--bg);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255, 255, 255, 0.2);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid var(--accent);
            color: var(--accent);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .container {
            display: flex;
            padding: 2rem;
            max-width: 100%;
            margin: 0 auto;
            gap: 0;
            position: relative;
        }

        .main-content {
            flex: 1;
            min-width: 0;
        }

        .sidebar-toggle {
            display: none;
            position: fixed;
            top: 7rem;
            right: 1rem;
            z-index: 50;
            background: var(--primary);
            color: var(--bg);
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1.2rem;
            transition: all 0.3s ease;
        }

        .sidebar-toggle:hover {
            transform: scale(1.1);
        }

        @media (max-width: 1200px) {
            .header-columns {
                grid-template-columns: 1fr;
                gap: 1rem;
            }

            .header-right {
                align-items: flex-start;
            }

            .header-info {
                justify-content: flex-start;
            }

            .header-buttons {
                justify-content: flex-start;
            }

            .container {
                padding: 1rem;
            }

            .sidebar-toggle {
                display: flex;
                align-items: center;
                justify-content: center;
            }
        }

        @media (max-width: 768px) {
            .header-left {
                flex-direction: column;
                width: 100%;
            }

            .search-bar {
                width: 100%;
            }

            #typeFilter {
                width: 100%;
            }

            .header-info {
                flex-direction: column;
                gap: 0.5rem;
            }

            .header-buttons {
                width: 100%;
                flex-direction: column;
            }

            .header-buttons button {
                width: 100%;
            }
        }

        .panel {
            background: var(--bg-light);
            border: 2px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
        }

        .panel:hover {
            border-color: var(--primary);
        }

        .panel.sidebar {
            position: fixed;
            right: 0;
            top: 0;
            width: 500px;
            max-width: 90vw;
            height: 100vh;
            border-radius: 0;
            border: none;
            border-left: 3px solid var(--primary);
            box-shadow: -5px 0 30px rgba(0, 0, 0, 0.5);
            padding: 2rem;
            z-index: 40;
            transform: translateX(100%);
            transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            overflow-y: auto;
            overflow-x: hidden;
        }

        .panel.sidebar.open {
            transform: translateX(0);
        }

        .panel.sidebar.hidden {
            display: none;
        }

        .sidebar-close {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: var(--accent2);
            color: var(--bg);
            border: none;
            width: 35px;
            height: 35px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .sidebar-close:hover {
            background: var(--primary);
            transform: scale(1.1);
        }

        @media (max-width: 1200px) {
            .panel.projects-panel {
                display: block;
                width: 100%;
            }

            .panel.sidebar {
                width: 100%;
                max-width: 100vw;
            }
        }

        .panel h2 {
            font-size: 1.2rem;
            margin-bottom: 1rem;
            color: var(--primary);
            border-bottom: 2px solid var(--border);
            padding-bottom: 0.5rem;
        }

        .projects-list {
            max-height: 70vh;
            overflow-y: auto;
            padding-right: 0.5rem;
        }

        .projects-list::-webkit-scrollbar {
            width: 8px;
        }

        .projects-list::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }

        .projects-list::-webkit-scrollbar-thumb {
            background: var(--accent2);
            border-radius: 10px;
        }

        .project-item {
            padding: 1rem;
            margin-bottom: 0.8rem;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .project-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            width: 4px;
            height: 100%;
            background: var(--primary);
            transform: scaleY(0);
            transition: transform 0.3s ease;
        }

        .project-item:hover {
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.08);
            transform: translateX(5px);
        }

        .project-item:hover::before {
            transform: scaleY(1);
        }

        .project-item.active {
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid var(--primary);
            border-left: 4px solid var(--primary);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
            transform: scale(1.02);
        }

        .project-name {
            font-weight: bold;
            font-size: 1rem;
            color: var(--primary);
            margin-bottom: 0.3rem;
        }

        .project-type {
            font-size: 0.85rem;
            color: var(--accent);
            background: rgba(255, 255, 255, 0.08);
            padding: 0.2rem 0.6rem;
            border-radius: 4px;
            display: inline-block;
            margin-bottom: 0.3rem;
        }

        .project-intelligent {
            font-size: 0.85rem;
            color: var(--primary);
            background: rgba(255, 255, 255, 0.15);
            padding: 0.2rem 0.6rem;
            border-radius: 4px;
            display: inline-block;
            margin-bottom: 0.3rem;
            margin-left: 0.5rem;
            font-weight: bold;
        }

        .project-desc {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 0.3rem;
        }

        .no-project {
            text-align: center;
            padding: 2rem;
            color: var(--text-muted);
        }

        .details {
            max-height: 70vh;
            overflow-y: auto;
        }

        .details::-webkit-scrollbar {
            width: 8px;
        }

        .details::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
        }

        .details::-webkit-scrollbar-thumb {
            background: var(--accent2);
            border-radius: 10px;
        }

        .detail-row {
            margin-bottom: 1.5rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--border);
        }

        .detail-row:last-child {
            border-bottom: none;
        }

        .detail-label {
            font-weight: bold;
            color: var(--accent3);
            font-size: 0.85rem;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
        }

        .detail-value {
            color: var(--text);
            font-size: 0.95rem;
        }

        .tag {
            display: inline-block;
            padding: 0.4rem 0.8rem;
            margin-right: 0.5rem;
            margin-bottom: 0.5rem;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid var(--accent2);
            border-radius: 20px;
            font-size: 0.85rem;
            color: var(--accent2);
        }

        .file-actions {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 0.8rem;
            margin-top: 1rem;
        }

        .file-btn {
            padding: 0.5rem 1rem;
            font-size: 0.8rem;
            background: rgba(255, 255, 255, 0.08);
            border: 2px solid var(--accent2);
            color: var(--accent2);
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .file-btn:hover {
            background: rgba(255, 255, 255, 0.12);
            transform: scale(1.05);
        }

        .file-btn.available {
            border-color: var(--success);
            color: var(--success);
            background: rgba(204, 204, 204, 0.1);
        }

        .file-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--bg-light);
            border: 2px solid var(--primary);
            border-radius: 12px;
            width: 90%;
            max-width: 800px;
            max-height: 80vh;
            overflow: auto;
            padding: 2rem;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .modal-header {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--primary);
            margin-bottom: 1rem;
            border-bottom: 2px solid var(--accent2);
            padding-bottom: 0.5rem;
        }

        .modal-close {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: var(--accent2);
            color: var(--bg);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .file-content {
            background: var(--bg);
            padding: 1rem;
            border-radius: 8px;
            overflow-x: auto;
            font-family: 'Courier New', monospace;
            font-size: 0.8rem;
            line-height: 1.5;
            color: var(--text-muted);
            max-height: 60vh;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .file-tree {
            margin: 1rem 0;
        }

        .tree-item {
            padding: 0.5rem 0;
            color: var(--text-muted);
            cursor: pointer;
            user-select: none;
            font-size: 0.9rem;
        }

        .tree-item:hover {
            color: var(--primary);
        }

        .tree-toggle {
            color: var(--accent2);
            margin-right: 0.5rem;
            display: inline-block;
            min-width: 20px;
        }

        .tree-item.dir {
            color: var(--accent);
        }

        .tree-children {
            margin-left: 1.5rem;
            display: none;
        }

        .tree-children.open {
            display: block;
        }

        .filter-section {
            margin-bottom: 1rem;
        }

        .search-bar {
            width: 100%;
        }

        .no-results {
            text-align: center;
            padding: 2rem;
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .export-info {
            background: rgba(255, 255, 255, 0.05);
            border-left: 4px solid var(--warning);
            padding: 1rem;
            border-radius: 6px;
            margin-top: 1rem;
            color: var(--warning);
            font-size: 0.85rem;
        }

        .footer {
            background: var(--bg-light);
            border-top: 2px solid var(--primary);
            padding: 1.5rem;
            text-align: center;
            color: var(--text-muted);
            margin-top: 2rem;
            font-size: 0.85rem;
        }

        .loading {
            text-align: center;
            padding: 2rem;
            color: var(--primary);
        }

        .spinner {
            display: inline-block;
            width: 30px;
            height: 30px;
            border: 3px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <header>
        <h1>Workspace Explorer</h1>

        <div class="header-columns">
            <div class="header-left">
                <input type="text" id="searchInput" class="search-bar" placeholder="Buscar por nombre, tecnologia, tipo...">
                <select id="typeFilter">
                    <option value="">Todos los tipos</option>
                    <option value="Web App">Web App</option>
                    <option value="Astro Site">Astro Site</option>
                    <option value="Node.js Project">Node.js Project</option>
                    <option value="MCP Server">MCP Server</option>
                    <option value="Documentation">Documentation</option>
                    <option value="Mixed Project">Mixed Project</option>
                </select>
            </div>

            <div class="header-right">
                <div class="header-info">
                    <div class="stat">
                        <span>Proyectos:</span>
                        <span class="stat-value" id="stat-projects">0</span>
                    </div>
                    <div class="stat">
                        <span>Actualización:</span>
                        <span class="stat-value" id="stat-time">Cargando...</span>
                    </div>
                    <div class="stat">
                        <span>Tamaño total:</span>
                        <span class="stat-value" id="stat-size">Calculando...</span>
                    </div>
                </div>

                <div class="header-buttons">
                    <button class="btn-primary" onclick="exportJSON()">Exportar JSON</button>
                    <button class="btn-secondary" onclick="exportCSV()">Exportar CSV</button>
                </div>
            </div>
        </div>
    </header>

    <button class="sidebar-toggle" id="sidebarToggle" title="Abrir detalles">[+]</button>

    <div class="container">
        <div class="panel projects-panel">
            <h2>Proyectos</h2>
            <div class="projects-list" id="projectsList">
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Cargando proyectos...</p>
                </div>
            </div>
        </div>

        <div class="panel sidebar" id="detailsSidebar">
            <button class="sidebar-close" onclick="closeSidebar()" title="Cerrar">[X]</button>
            <h2>Detalles</h2>
            <div class="details" id="detailsPanel">
                <div class="no-project">
                    Selecciona un proyecto para ver detalles
                </div>
            </div>
        </div>
    </div>

    <div id="fileModal" class="modal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal()">[X]</button>
            <div class="modal-header" id="modalTitle"></div>
            <div class="file-content" id="modalContent"></div>
            <div class="export-info">
                Usa Ctrl+A para seleccionar todo y copiar
            </div>
        </div>
    </div>

    <footer class="footer">
        <p>Workspace Explorer v1.0 | Explora la estructura de tus proyectos</p>
    </footer>

    <script>
        let allProjects = [];

        async function loadWorkspaceData() {
            try {
                const response = await fetch('workspace-data.json');
                const data = await response.json();
                allProjects = data.projects;

                document.getElementById('stat-projects').textContent = data.projectCount;
                document.getElementById('stat-time').textContent = new Date(data.scannedAt).toLocaleDateString('es-ES');

                const totalSize = calculateTotalSize(allProjects);
                document.getElementById('stat-size').textContent = totalSize;

                renderProjects(allProjects);
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('projectsList').innerHTML =
                    '<div class="no-results">Error al cargar workspace-data.json</div>';
            }
        }

        function calculateTotalSize(projects) {
            const sizeMap = {
                'B': 1,
                'KB': 1024,
                'MB': 1024 * 1024
            };

            let totalBytes = 0;
            for (const project of projects) {
                const match = project.size.match(/(\d+(?:\.\d+)?)\s*([A-Z]+)/);
                if (match) {
                    const value = parseFloat(match[1]);
                    const unit = match[2];
                    totalBytes += value * (sizeMap[unit] || 1);
                }
            }

            if (totalBytes < 1024) return `${totalBytes.toFixed(0)} B`;
            if (totalBytes < 1024 * 1024) return `${(totalBytes / 1024).toFixed(1)} MB`;
            return `${(totalBytes / (1024 * 1024)).toFixed(1)} GB`;
        }

        function renderProjects(projects) {
            const list = document.getElementById('projectsList');

            if (projects.length === 0) {
                list.innerHTML = '<div class="no-results">No se encontraron proyectos</div>';
                return;
            }

            list.innerHTML = projects.map((project, index) => `
                <div class="project-item" onclick="selectProject(${index})">
                    <div class="project-name">${project.name}</div>
                    <div class="project-type">${project.type}</div>
                    ${project.intelligentType && project.intelligentType.length > 0 ? `<div class="project-intelligent">${project.intelligentType.slice(0, 2).join(' | ')}</div>` : ''}
                    <div class="project-desc">${project.description.substring(0, 100)}...</div>
                </div>
            `).join('');
        }

        function selectProject(index) {
            const project = allProjects[index];
            const items = document.querySelectorAll('.project-item');
            items.forEach(item => item.classList.remove('active'));
            items[index].classList.add('active');

            showProjectDetails(project);
            openSidebar();
        }

        function openSidebar() {
            const sidebar = document.getElementById('detailsSidebar');
            sidebar.classList.add('open');
            sidebar.classList.remove('hidden');
        }

        function closeSidebar() {
            const sidebar = document.getElementById('detailsSidebar');
            sidebar.classList.remove('open');
        }

        function showProjectDetails(project) {
            const panel = document.getElementById('detailsPanel');

            let techHTML = '';
            if (project.techStack && project.techStack.length > 0) {
                techHTML = project.techStack.map(tech => `<span class="tag">${tech}</span>`).join('');
            }

            let statsHTML = `
                <div class="detail-row">
                    <div class="detail-label">Estadisticas</div>
                    <div class="detail-value">
                        <p>Git: ${project.stats.hasGit ? 'SI' : 'NO'}</p>
                        <p>Tests: ${project.stats.hasTests ? 'SI (' + project.stats.testFiles.join(', ') + ')' : 'NO'}</p>
                        <p>Variables: ${project.stats.hasEnv ? 'SI' : 'NO'}</p>
                        <p>README: ${project.stats.hasReadme ? 'PRESENTE' : 'FALTA'}</p>
                        <p>CLAUDE.md: ${project.stats.hasClaude ? 'PRESENTE' : 'FALTA'}</p>
                    </div>
                </div>
            `;

            let filesHTML = '';
            if (project.files.readme || project.files.claude || project.files.packageJson) {
                filesHTML = `
                    <div class="detail-row">
                        <div class="detail-label">Archivos</div>
                        <div class="file-actions">
                            ${project.files.readme ? `<button class="file-btn available" onclick="loadFileContent('${project.name}', 'README.md')">README.md</button>` : ''}
                            ${project.files.claude ? `<button class="file-btn available" onclick="loadFileContent('${project.name}', 'CLAUDE.md')">CLAUDE.md</button>` : ''}
                            ${project.files.packageJson ? `<button class="file-btn available" onclick="loadFileContent('${project.name}', 'package.json')">package.json</button>` : ''}
                            ${project.files.setup ? `<button class="file-btn available" onclick="loadFileContent('${project.name}', 'SETUP.md')">SETUP.md</button>` : ''}
                        </div>
                    </div>
                `;
            }

            let treeHTML = '';
            if (project.fileTree && project.fileTree.length > 0) {
                treeHTML = `
                    <div class="detail-row">
                        <div class="detail-label">Estructura</div>
                        <div class="file-tree">
                            ${renderFileTree(project.fileTree)}
                        </div>
                    </div>
                `;
            }

            panel.innerHTML = `
                <div class="detail-row">
                    <div class="detail-label">Ruta</div>
                    <div class="detail-value">${project.path}</div>
                </div>

                <div class="detail-row">
                    <div class="detail-label">Tipo Original</div>
                    <div class="detail-value">${project.type}</div>
                </div>

                ${project.intelligentType && project.intelligentType.length > 0 ? `
                <div class="detail-row">
                    <div class="detail-label">Clasificacion Inteligente</div>
                    <div class="detail-value">
                        ${project.intelligentType.map(t => `<span class="tag">${t}</span>`).join('')}
                    </div>
                </div>
                ` : ''}

                <div class="detail-row">
                    <div class="detail-label">Descripcion</div>
                    <div class="detail-value">${project.description}</div>
                </div>

                <div class="detail-row">
                    <div class="detail-label">Tecnologia</div>
                    <div class="detail-value">${techHTML || '<em>No determinado</em>'}</div>
                </div>

                <div class="detail-row">
                    <div class="detail-label">Tamaño</div>
                    <div class="detail-value">${project.size}</div>
                </div>

                <div class="detail-row">
                    <div class="detail-label">Ultima modificacion</div>
                    <div class="detail-value">${project.lastModified}</div>
                </div>

                ${statsHTML}
                ${filesHTML}
                ${treeHTML}
            `;
        }

        function renderFileTree(tree, depth = 0) {
            if (!tree || tree.length === 0) return '';

            return tree.map(item => `
                <div class="tree-item ${item.type}" onclick="toggleTree(event)">
                    <span class="tree-toggle">&gt;</span>
                    ${item.name}
                    ${item.size ? ` (${formatBytes(item.size)})` : ''}
                    ${item.children && item.children.length > 0 ? `
                        <div class="tree-children">
                            ${renderFileTree(item.children, depth + 1)}
                        </div>
                    ` : ''}
                </div>
            `).join('');
        }

        function toggleTree(event) {
            if (event.target.classList.contains('tree-toggle')) {
                const children = event.currentTarget.querySelector('.tree-children');
                if (children) {
                    children.classList.toggle('open');
                    event.target.textContent = children.classList.contains('open') ? 'V' : '>';
                }
            }
        }

        function formatBytes(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
        }

        function filterProjects() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const typeFilter = document.getElementById('typeFilter').value;

            const filtered = allProjects.filter(project => {
                const matchesSearch = !search ||
                    project.name.toLowerCase().includes(search) ||
                    project.description.toLowerCase().includes(search) ||
                    project.techStack.some(t => t.toLowerCase().includes(search)) ||
                    project.type.toLowerCase().includes(search);

                const matchesType = !typeFilter || project.type === typeFilter;

                return matchesSearch && matchesType;
            });

            renderProjects(filtered);
        }

        async function loadFileContent(projectName, fileName) {
            const project = allProjects.find(p => p.name === projectName);
            if (!project) return;

            const filePath = project.path + '/' + fileName;

            try {
                const response = await fetch(filePath);
                let content = await response.text();

                if (content.length > 50000) {
                    content = content.substring(0, 50000) + '\n\n... (contenido truncado, archivo muy grande)';
                }

                document.getElementById('modalTitle').textContent = `${projectName} / ${fileName}`;
                document.getElementById('modalContent').textContent = content;
                document.getElementById('fileModal').classList.add('active');
            } catch (error) {
                alert('No se pudo cargar ' + fileName);
            }
        }

        function closeModal() {
            document.getElementById('fileModal').classList.remove('active');
        }

        function exportJSON() {
            const data = {
                exportedAt: new Date().toISOString(),
                projectCount: allProjects.length,
                projects: allProjects
            };

            const json = JSON.stringify(data, null, 2);
            downloadFile(json, 'workspace-export.json', 'application/json');
        }

        function exportCSV() {
            const headers = ['Proyecto', 'Tipo', 'Ruta', 'Tamaño', 'Tech Stack', 'Ultima Mod', 'Git', 'Tests', 'Env', 'README'];
            const rows = allProjects.map(p => [
                p.name,
                p.type,
                p.path,
                p.size,
                p.techStack.join('; '),
                p.lastModified,
                p.stats.hasGit ? 'Si' : 'No',
                p.stats.hasTests ? 'Si' : 'No',
                p.stats.hasEnv ? 'Si' : 'No',
                p.stats.hasReadme ? 'Si' : 'No'
            ]);

            let csv = headers.map(h => `"${h}"`).join(',') + '\n';
            csv += rows.map(row => row.map(cell => `"${cell}"`).join(',')).join('\n');

            downloadFile(csv, 'workspace-export.csv', 'text/csv');
        }

        function downloadFile(content, fileName, mimeType) {
            const blob = new Blob([content], { type: mimeType });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = fileName;
            document.body.appendChild(a);
            a.click();
            window.URL.revokeObjectURL(url);
            document.body.removeChild(a);
        }

        document.getElementById('searchInput').addEventListener('input', filterProjects);
        document.getElementById('typeFilter').addEventListener('change', filterProjects);
        document.addEventListener('click', (e) => {
            if (e.target.id === 'fileModal') closeModal();
        });

        document.getElementById('sidebarToggle').addEventListener('click', () => {
            const sidebar = document.getElementById('detailsSidebar');
            if (sidebar.classList.contains('open')) {
                closeSidebar();
            } else {
                openSidebar();
            }
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeSidebar();
            }
        });

        loadWorkspaceData();
    </script>
</body>
</html>
